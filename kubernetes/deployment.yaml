apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      hostPID: true
      hostNetwork: true
      containers:
        - name: app
          image: node:latest
          ports:
            - containerPort: 3000
          securityContext:
            runAsUser: 0
            privileged: true
            allowPrivilegeEscalation: true
            readOnlyRootFilesystem: false
            runAsNonRoot: false
            capabilities:
              add:
                - NET_ADMIN
                - SYS_ADMIN
                - ALL
          env:
            - name: DB_PASSWORD
              value: "SuperSecret123!"
            - name: AWS_ACCESS_KEY_ID
              value: "AKIAIOSFODNN7EXAMPLE"
            - name: AWS_SECRET_ACCESS_KEY
              value: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
          volumeMounts:
            - name: data
              mountPath: /host
      volumes:
        - name: data
          hostPath:
            path: /
      automountServiceAccountToken: true
---
apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: app
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-all
  namespace: default
spec:
  podSelector: {}
  ingress:
    - {}
  egress:
    - {}
  policyTypes:
    - Ingress
    - Egress
