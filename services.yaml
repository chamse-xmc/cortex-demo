apiVersion: v1
kind: Service
metadata:
  name: brokenbank-flask
  namespace: cortex-demo
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
spec:
  type: LoadBalancer
  selector:
    app: gocortex-brokenbank
  ports:
    - port: 8888
      targetPort: 8888
---
apiVersion: v1
kind: Service
metadata:
  name: brokenbank-tomcat
  namespace: cortex-demo
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
spec:
  type: LoadBalancer
  selector:
    app: gocortex-brokenbank
  ports:
    - port: 9999
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: brokenbank-react
  namespace: cortex-demo
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
spec:
  type: LoadBalancer
  selector:
    app: gocortex-brokenbank
  ports:
    - port: 7777
      targetPort: 7777
